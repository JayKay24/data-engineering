[GLOBAL]
pants_version = "2.22.0"

# Enable python backend and Ruff linter/formatter backend
backend_packages = [
  "pants.backend.python",
  "pants.backend.experimental.python.lint.ruff.check",
  "pants.backend.experimental.python.lint.ruff.format",
]

[python]
# Restrict interpreter to Python 3.10.9
interpreter_constraints = ["==3.10.9"]

# Configure global lockfile setup
enable_resolves = true
default_resolve = "shared-lock"

[python.resolves]
shared-lock = "3rdparty/user_reqs.lock"

[python-bootstrap]
search_path = [
  "<PYENV>",
  "<PATH>",
]

[ruff]
# Enable both linting and formatting with Ruff
args = []
